<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lupo">
<meta name="description" content="Raise a wolf by staying off your phone. Levels never reset, the wolf never dies, and the next milestone is always less than a week away.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Lupo">
<meta property="og:title" content="Lupo: Raise a Wolf, Beat Screen Time">
<meta property="og:description" content="Raise a wolf by staying off your phone. Levels never reset. The wolf never dies.">
<meta property="og:image" content="https://raiselupo.chleb.ai/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://raiselupo.chleb.ai/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Lupo: Raise a Wolf, Beat Screen Time">
<meta name="twitter:description" content="Raise a wolf by staying off your phone. Levels never reset. The wolf never dies.">
<meta name="twitter:image" content="https://raiselupo.chleb.ai/og-image.png">
<title>Lupo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="app.css">
</head>
<body>

<div id="splash">
  <img src="icon-512.png" alt="Lupo" class="splash-logo">
  <div class="splash-name">LUPO</div>
  <div class="splash-tag">RAISE YOUR WOLF</div>
</div>

<div id="app" hidden>

  <!-- ════════ ONBOARDING ════════ -->
  <section class="screen onboarding" id="screen-onboarding" hidden>
    <div class="ob-progress" role="group" aria-label="Setup progress">
      <span class="ob-dot" data-d="0"></span>
      <span class="ob-dot" data-d="1"></span>
      <span class="ob-dot" data-d="2"></span>
      <span class="ob-dot" data-d="3"></span>
    </div>
    <div class="ob-body" id="obBody"></div>
    <div class="ob-footer"><button class="btn-primary" id="obNext" type="button">CONTINUE</button></div>
  </section>

  <!-- ════════ MAIN ════════ -->
  <main class="app-main" id="appMain" hidden>

    <header class="top-bar">
      <div>
        <div class="top-name" id="topName">LUPO</div>
        <div class="top-sub" id="topSub"></div>
      </div>
      <div class="top-right">
        <div class="streak-badge" id="streakBadge" title="Day streak"><span aria-hidden="true">🔥</span><span id="streakCount">0</span></div>
        <button class="gear-btn" id="gearBtn" type="button" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 13.5a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.03 1.56V20a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.11-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1.03H4a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.56-1.11 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.08A1.7 1.7 0 0 0 11 4.09V4a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1.03 1.56h.08a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.08a1.7 1.7 0 0 0 1.56 1.03H20a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1.03Z"/></svg>
        </button>
      </div>
    </header>

    <section class="screen scroll" id="screen-wolf"></section>
    <section class="screen scroll" id="screen-today" hidden></section>
    <section class="screen scroll" id="screen-journey" hidden></section>
    <section class="screen scroll" id="screen-den" hidden></section>

    <nav class="tab-bar" id="tabBar" aria-label="Main">
      <button class="tab active" data-screen="wolf" type="button" aria-current="page">
        <span class="tab-emo" aria-hidden="true">🐺</span><span>WOLF</span>
      </button>
      <button class="tab" data-screen="today" type="button">
        <span class="tab-emo" aria-hidden="true">☑️</span><span>TODAY</span>
      </button>
      <button class="tab" data-screen="journey" type="button">
        <span class="tab-emo" aria-hidden="true">🌙</span><span>JOURNEY</span>
      </button>
      <button class="tab" data-screen="den" type="button">
        <span class="tab-emo" aria-hidden="true">🏕️</span><span>DEN</span>
      </button>
    </nav>
  </main>

  <!-- celebration / discovery / settings overlays are injected by ui.js -->
  <div id="overlayRoot"></div>

  <div id="grain" aria-hidden="true"></div>
</div>

<script src="sound.js"></script>
<script type="module" src="js/main.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    var _hadController = !!navigator.serviceWorker.controller;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!_hadController) return;
      if (sessionStorage.getItem('lupoSwReloaded')) return;
      try { sessionStorage.setItem('lupoSwReloaded', '1'); } catch (e) {}
      window.location.reload();
    });
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then((reg) => {
        if (!reg) return;
        reg.update();
        setInterval(() => reg.update(), 15 * 60 * 1000);
        document.addEventListener('visibilitychange', () => { if (!document.hidden) reg.update(); });
      }).catch(() => {});
    });
  }
</script>
</body>
</html>
